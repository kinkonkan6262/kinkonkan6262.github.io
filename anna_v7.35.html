function OutsideTab({names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [busy,setBusy]=useState(false);
  const [aiPlan,setAiPlan]=useState("");
  const [viewDay,setViewDay]=useState(null); // 日付クリックで当日詳細

  const WD2=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];

  const [y2,m2]=ym.split("-").map(Number);
  const nd=new Date(y2,m2,0).getDate();

  // 月全体の施設外就労一覧
  const rows=names.map(n=>{
    const u=allData[n]||{};
    const md=(u.att||{})[ym]||{};
    const outDays=[];
    for(let d=1;d<=nd;d++){
      const v=md[d]||{};
      if(v.st==="\u5916"){
        const dt=new Date(y2,m2-1,d);
        outDays.push({d,wd:WD2[dt.getDay()],in:v.in||"",out:v.out||"",memo:v.memo||""});
      }
    }
    const {use}=getAttDays(u.att||{},ym);
    return {n,jukyu:u.jukyu||"",outDays,outCount:outDays.length,inCount:use};
  }).filter(r=>r.outCount>0||r.inCount>0);

  // 当日集計（施設外+通所）
  const buildDayReport=(day)=>{
    const outsideList=[];
    const insideList=[];
    names.forEach(n=>{
      const u=allData[n]||{};
      const md=(u.att||{})[ym]||{};
      const v=md[day]||{};
      if(v.st==="\u5916") outsideList.push({n,in:v.in||"",out:v.out||"",memo:v.memo||""});
      else if(v.st==="\u901A") insideList.push({n,in:v.in||"",out:v.out||"",memo:v.memo||""});
    });
    return {day,wd:WD2[new Date(y2,m2-1,day).getDay()],outsideList,insideList};
  };

  const totalOut=rows.reduce((a,r)=>a+r.outCount,0);

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    let lines=[["\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u65E5","\u66DC\u65E5","\u533A\u5206","\u958B\u59CB","\u7D42\u4E86","\u5099\u8003"].map(esc).join(",")];
    names.forEach(n=>{
      const u=allData[n]||{};
      const md=(u.att||{})[ym]||{};
      for(let d=1;d<=nd;d++){
        const v=md[d]||{};
        if(v.st==="\u5916"||v.st==="\u901A"){
          const dt=new Date(y2,m2-1,d);
          lines.push([n,u.jukyu||"",d,WD2[dt.getDay()],v.st==="\u5916"?"\u65BD\u8A2D\u5916\u5C31\u52B4":"\u901A\u6240",v.in||"",v.out||"",v.memo||""].map(esc).join(","));
        }
      }
    });
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u65BD\u8A2D\u5916\u5C31\u52B4_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  const genAI=async()=>{
    setBusy(true);setAiPlan("");
    const summary=rows.filter(r=>r.outCount>0).map(r=>`${r.n}:施設外${r.outCount}日`).join("\u3001");
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}施設外就労。${summary||"\u65BD\u8A2D\u5916\u5C31\u52B4\u306A\u3057"}、延べ${totalOut}日。今月の振り返りと来月への一言を70文字以内で。`);
    setAiPlan(txt||"");setBusy(false);
  };

  const dayReport=viewDay?buildDayReport(viewDay):null;

  return <div style={{padding:14}}>
    <Header title={"\u1F3ED \u65BD\u8A2D\u5916\u5C31\u52B4 \u2015 "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} color="#1B5E20">📥 CSV出力（施設外+通所）</GBtn>
      <GBtn onClick={genAI} busy={busy}>🤖 AIコメント</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"5px 12px",fontSize:11,color:"#1B5E20"}}>
        施設外就労者：<b>{rows.filter(r=>r.outCount>0).length}名</b> ／ 延べ：<b>{totalOut}日</b>
      </div>
    </div>
    {aiPlan&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"7px 12px",marginBottom:8,fontSize:12,color:"#1B5E20"}}>💬 {aiPlan}</div>}

    {/* ▼ 当日集計ボタン（日付カレンダー） */}
    <div style={{background:"#E3F2FD",border:"1px solid #90CAF9",borderRadius:6,padding:10,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:"bold",color:"#1565C0",marginBottom:6}}>📅 当日集計（日付をクリック → 施設外＋通所 同時表示）</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {Array.from({length:nd},(_,i)=>i+1).map(d=>{
          const dt=new Date(y2,m2-1,d);
          const wd=dt.getDay();
          // この日の施設外人数
          const cnt=names.filter(n=>{const v=((allData[n]||{}).att||{})[ym]?.[d]||{};return v.st==="\u5916";}).length;
          const cntIn=names.filter(n=>{const v=((allData[n]||{}).att||{})[ym]?.[d]||{};return v.st==="\u901A";}).length;
          const isWe=wd===0||wd===6;
          return <button key={d} onClick={()=>setViewDay(viewDay===d?null:d)}
            style={{width:36,height:36,border:viewDay===d?"2px solid #1565C0":"1px solid #90CAF9",borderRadius:4,cursor:isWe?"default":"pointer",
              background:viewDay===d?"#1565C0":cnt>0?"#E8F5E9":isWe?"#f5f5f5":"#fff",
              color:viewDay===d?"#fff":wd===0?"#C62828":wd===6?"#1565C0":"#333",
              fontSize:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.2}}>
            <span>{d}</span>
            {(cnt>0||cntIn>0)&&<span style={{fontSize:8,color:viewDay===d?"#fff":"#388E3C"}}>外{cnt}/通{cntIn}</span>}
          </button>;
        })}
      </div>
    </div>

    {/* 当日詳細 */}
    {dayReport&&<div style={{background:"#fff",border:"2px solid #1565C0",borderRadius:6,padding:12,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:"bold",color:"#1565C0",marginBottom:8}}>
        📋 {m2}月{dayReport.day}日（{dayReport.wd}）の出勤状況
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginBottom:4}}>🏭 施設外就労 ({dayReport.outsideList.length}名)</div>
          {dayReport.outsideList.length===0?<div style={{fontSize:11,color:"#999"}}>なし</div>:
            dayReport.outsideList.map((u,i)=><div key={i} style={{fontSize:11,padding:"3px 0",borderBottom:"1px solid #eee"}}>
              {u.n}　{u.in&&u.out?u.in+"\u301C"+u.out:""}　{u.memo&&<span style={{color:"#555"}}>({u.memo})</span>}
            </div>)}
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:"bold",color:"#0277BD",marginBottom:4}}>🏠 通所 ({dayReport.insideList.length}名)</div>
          {dayReport.insideList.length===0?<div style={{fontSize:11,color:"#999"}}>なし</div>:
            dayReport.insideList.map((u,i)=><div key={i} style={{fontSize:11,padding:"3px 0",borderBottom:"1px solid #eee"}}>
              {u.n}　{u.in&&u.out?u.in+"\u301C"+u.out:""}
            </div>)}
        </div>
      </div>
    </div>}

    {/* 月別一覧 */}
    {rows.filter(r=>r.outCount>0).map(r=><div key={r.n} style={{marginBottom:14,border:"1px solid #A5D6A7",borderRadius:6,overflow:"hidden"}}>
      <div style={{background:"#1B5E20",color:"#fff",padding:"6px 12px",fontSize:12,fontWeight:"bold",display:"flex",justifyContent:"space-between"}}>
        <span>🏭 {r.n}</span>
        <span>施設外 {r.outCount}日 ／ 総利用 {r.inCount}日</span>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <th style={{...th,width:"8%"}}>日</th>
          <th style={{...th,width:"8%"}}>曜</th>
          <th style={{...th,width:"12%"}}>開始</th>
          <th style={{...th,width:"12%"}}>終了</th>
          <th style={th}>就労内容・備考</th>
        </tr></thead>
        <tbody>
          {r.outDays.map(d=><tr key={d.d}>
            <td style={{...td,textAlign:"center"}}>{d.d}</td>
            <td style={{...td,textAlign:"center",color:d.wd==="\u65E5"?"#C62828":d.wd==="\u571F"?"#1565C0":"#444"}}>{d.wd}</td>
            <td style={{...td,textAlign:"center"}}>{d.in}</td>
            <td style={{...td,textAlign:"center"}}>{d.out}</td>
            <td style={td}>{d.memo||<span style={{color:"#bbb"}}>（記録なし）</span>}</td>
          </tr>)}
        </tbody>
      </table>
    </div>)}
    {rows.filter(r=>r.outCount>0).length===0&&<div style={{textAlign:"center",color:"#999",padding:20}}>この月の施設外就労記録がありません</div>}
  </div>;
}



// 15. 出席状況タブ（開所日数選択・設定localStorage保存）
// ============================================================
function KaikinTab({names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  // localStorage から設定を復元（タブ切替後も保持）
  const KAIKIN_KEY=officeKey("kaikin_settings");
  const loadKaikinSettings=()=>{
    try{ return JSON.parse(localStorage.getItem(KAIKIN_KEY)||"{}"); }catch(e){ return {}; }
  };
  const [settings,setSettingsState]=useState(()=>loadKaikinSettings());
  const saveSettings=(key,val)=>{
    setSettingsState(prev=>{
      const next={...prev,[key]:val};
      try{localStorage.setItem(KAIKIN_KEY,JSON.stringify(next));}catch(e){}
      return next;
    });
  };
  const openKey=ym+"_open";
  const modeKey=ym+"_mode"; // "all"=平日全て, "count"=日数選択, "manual"=手動入力
  const countKey=ym+"_count";
  const openDaysInput=settings[openKey]||"";
  const inputMode=settings[modeKey]||"all";
  const setOpenDaysInput=v=>saveSettings(openKey,v);
  const setInputMode=v=>saveSettings(modeKey,v);
  const [y2,m2]=ym.split("-").map(Number);
  const nd=new Date(y2,m2,0).getDate();
  const allWeekdays=[];
  for(let d=1;d<=nd;d++){
    const wd=new Date(y2,m2-1,d).getDay();
    if(wd!==0&&wd!==6) allWeekdays.push(d);
  }
  const openCount2=settings[countKey]||allWeekdays.length;
  const setOpenCount2=v=>saveSettings(countKey,Number(v));
  const parseOpenDays=()=>{
    if(inputMode==="all") return allWeekdays;
    if(inputMode==="count") return allWeekdays.slice(0,Number(openCount2)||allWeekdays.length);
    if(!openDaysInput.trim()) return allWeekdays;
    return openDaysInput.split(/[,、\s]+/).map(Number).filter(d=>d>=1&&d<=nd);
  };
  const openDays=parseOpenDays();
  const openCount=openDays.length;

  const rows=names.map(n=>{
    const u=allData[n]||{};
    const md=(u.att||{})[ym]||{};
    let use=0,abs=0,kasan=0;
    openDays.forEach(d=>{
      const v=md[d]||{};
      if(v.st==="通"||v.st==="外") use++;
      else if(v.st==="欠") abs++;
      else if(v.st==="加") kasan++;
    });
    const rate=openCount>0?Math.round(use/openCount*100):0;
    return {n,use,abs,kasan,rate,jukyu:u.jukyu||""};
  }).filter(r=>r.use>0||r.abs>0||r.kasan>0);

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const lines=[["氏名","受給者証番号","利用日数","欠席","欠席加算","出席率(%)"].map(esc).join(",")]
      .concat(rows.slice().sort((a,b)=>b.rate-a.rate).map(r=>[r.n,r.jukyu,r.use,r.abs,r.kasan,r.rate].map(esc).join(",")));
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="出席状況_"+ym+".csv";a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  };

  return <div style={{padding:14}}>
    <Header title={"📊 出席状況 ― "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} disabled={rows.length===0} color="#1B5E20">📥 CSV出力</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <MonthNav ym={ym} setYm={setYm}/>
    </div>
    {/* 開所日設定（localStorage保存で他タブ移動後も保持） */}
    <div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:6,padding:10,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:"bold",color:"#1B5E20",marginBottom:8}}>📅 開所日の設定（自動保存・出席率の分母になります）</div>
      <div style={{display:"flex",gap:8,marginBottom:6}}>
        {[["all","平日全て（デフォルト）"],["count","開所日数を選択"],["manual","日付を手動入力"]].map(([v,lbl])=>(
          <label key={v} style={{fontSize:11,display:"flex",alignItems:"center",gap:3,cursor:"pointer",
            background:inputMode===v?"#1B5E20":"#fff",color:inputMode===v?"#fff":"#333",
            border:"1px solid "+(inputMode===v?"#1B5E20":"#A5D6A7"),borderRadius:4,padding:"3px 8px"}}>
            <input type="radio" value={v} checked={inputMode===v} onChange={()=>setInputMode(v)}
              style={{display:"none"}}/>
            {lbl}
          </label>
        ))}
      </div>
      {inputMode==="all"&&<div style={{fontSize:11,color:"#555",padding:"4px 8px",background:"#fff",borderRadius:4,border:"1px solid #C8E6C9",display:"inline-block"}}>
        📌 {fmtYM(ym)}の平日: <b style={{color:"#1B5E20"}}>{allWeekdays.length}日</b>（{allWeekdays[0]}日〜{allWeekdays[allWeekdays.length-1]}日）
      </div>}
      {inputMode==="count"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:11,color:"#555"}}>開所日数：</span>
        <select value={openCount2} onChange={e=>setOpenCount2(e.target.value)}
          style={{padding:"4px 8px",fontSize:12,border:"1px solid #A5D6A7",borderRadius:4,fontWeight:"bold"}}>
          {Array.from({length:allWeekdays.length},(_,i)=>i+1).map(n=>(
            <option key={n} value={n}>{n}日</option>
          ))}
        </select>
        <span style={{fontSize:11,color:"#555"}}>（平日の先頭から）</span>
      </div>}
      {inputMode==="manual"&&<div>
        <div style={{fontSize:10,color:"#888",marginBottom:2}}>日付をスペース・カンマ区切りで入力</div>
        <input value={openDaysInput} onChange={e=>setOpenDaysInput(e.target.value)}
          placeholder="例: 1 2 3 6 7 8 9 10"
          style={{width:"100%",maxWidth:400,padding:"5px 8px",fontSize:11,border:"1px solid #A5D6A7",borderRadius:4}}/>
      </div>}
      <div style={{marginTop:5,fontSize:11,color:"#1B5E20",fontWeight:"bold"}}>
        → 開所日数: <span style={{fontSize:14}}>{openCount}</span>日
        <span style={{fontSize:10,color:"#888",marginLeft:8,fontWeight:"normal"}}>（設定は自動保存されます）</span>
      </div>
    </div>

    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>
        <th style={th}>氏名</th>
        <th style={{...th,width:"12%"}}>利用日数</th>
        <th style={{...th,width:"9%"}}>欠席</th>
        <th style={{...th,width:"9%"}}>欠席加算</th>
        <th style={{...th,width:"22%"}}>出席率</th>
      </tr></thead>
      <tbody>
        {rows.length===0&&<tr><td colSpan={5} style={{...td,textAlign:"center",color:"#999",padding:14}}>この月の実績がありません</td></tr>}
        {rows.slice().sort((a,b)=>b.rate-a.rate).map(r=><tr key={r.n}>
          <td style={td}>{r.n}</td>
          <td style={{...td,textAlign:"center",fontWeight:"bold"}}>{r.use}日</td>
          <td style={{...td,textAlign:"center",color:r.abs>0?"#C62828":"#aaa"}}>{r.abs>0?r.abs+"日":"－"}</td>

                <table style={{borderCollapse:"collapse",fontSize:10,minWidth:640}}>
                  <thead>
                    <tr style={{background:"#BBDEFB"}}>

                        <th key={i} style={{border:"1px solid #90CAF9",padding:"3px 5px",textAlign:"center",minWidth:i===0?55:i===1?70:i===2||i===3?50:i===7?110:32}}>{h}</th>

                    {Array.from({length:nd},(_,i)=>i+1).map(d=>{

                      const dt=new Date(y2,m2-1,d);

                      const bg=wd===0?"#FFEBEE":wd===6?"#E3F2FD":v.st?"#fff":"#F5F5F5";
                      return (
                        <tr key={d} style={{background:bg}}>

                          <td style={{border:"1px solid #BBDEFB",padding:"2px 5px",textAlign:"center",fontWeight:v.st?"bold":"normal",color:v.st==="通"?"#1B5E20":v.st==="欠"||v.st==="加"?"#E65100":v.st==="外"?"#1565C0":"#999"}}>{ST2[v.st||""]||"―"}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px 5px",textAlign:"center"}}>{v.in||""}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px 5px",textAlign:"center"}}>{v.out||""}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px",textAlign:"center",background:v.s1?"#FFF9C4":""}}>{v.s1?"往":""}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px",textAlign:"center",background:v.s2?"#FFF9C4":""}}>{v.s2?"復":""}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px",textAlign:"center",background:v.meal?"#E8F5E9":""}}>{v.meal?"✓":""}</td>
                          <td style={{border:"1px solid #BBDEFB",padding:"2px 5px",fontSize:10,color:"#555"}}>{v.memo||""}</td>

                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })}
      </div>}

      <div style={{marginTop:10,fontSize:10,color:"#888",lineHeight:1.8}}>
        ※ 算定要件（加算の届出・体制要件等）は最新の報酬告示・自治体の指導に従いご確認ください。<br/>
        ※ 受給者証番号は「実績記録タブ」、事業所番号は「🏢事業所設定」で入力できます。
      </div>
    </div>
  );
}

};
function CheckGroup({label,options,value,onChange}){
  const v=value||[];
  const toggle=(opt)=>onChange(v.includes(opt)?v.filter(x=>x!==opt):[...v,opt]);
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:4}}>{label}</div>
    <div className="screen-only" style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {options.map(opt=>(
        <label key={opt} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,background:v.includes(opt)?GP:"#f5f5f5",padding:"4px 8px",borderRadius:4,border:"1px solid "+(v.includes(opt)?GM:"#ddd"),cursor:"pointer"}}>
          <input type="checkbox" checked={v.includes(opt)} onChange={()=>toggle(opt)}/>{opt}
        </label>
      ))}
    </div>
    <div className="print-only" style={{fontSize:11}}>{v.length?v.join("、"):"\u3000"}</div>
  </div>;
}
function RadioGroup({label,options,value,onChange}){
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:4}}>{label}</div>
    <div className="screen-only" style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {options.map(opt=>(
        <label key={opt} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,background:value===opt?GP:"#f5f5f5",padding:"4px 8px",borderRadius:4,border:"1px solid "+(value===opt?GM:"#ddd"),cursor:"pointer"}}>
          <input type="radio" checked={value===opt} onChange={()=>onChange(opt)}/>{opt}
        </label>
      ))}
    </div>
    <div className="print-only" style={{fontSize:11}}>{value||"\u3000"}</div>
  </div>;
}
function TF({label,value,onChange,placeholder}){
  return <div style={{marginBottom:10}}>
    <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>{label}</div>
    <input value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} className="screen-only"
      style={{width:"100%",padding:"6px 8px",fontSize:12,border:"1px solid #C8E6C9",borderRadius:4,boxSizing:"border-box"}}/>
    <div className="print-only" style={{fontSize:11}}>{value||"\u3000"}</div>
  </div>;
}

        <PA v={m.livingNote} s={v=>up("livingNote",v)} rows={2}/>
        <div style={{marginTop:10}}><TF label="免許・資格・検定" value={m.license} onChange={v=>up("license",v)} placeholder="\u4F8B\uFF1A\u666E\u901A\u81EA\u52D5\u8ECA\u904B\u8EE2\u514D\u8A31"/></div>
        <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3,marginTop:6}}>その他備考</div>

}

// ===== お客様苦情受付 =====
function CustomerComplaintTab(){
  const ADMIN_MAIL="azu18ei20@gmail.com";
  const [customer,setCustomer]=useState("");
  const [company,setCompany]=useState("");
  const [email,setEmail]=useState("");
  const [soft,setSoft]=useState("");
  const [ctype,setCtype]=useState("\u4E0D\u5177\u5408\u30FB\u30A8\u30E9\u30FC");
  const [priority,setPriority]=useState("\u901A\u5E38");
  const [body,setBody]=useState("");
  const [request,setRequest]=useState("");
  const [out,setOut]=useState("");
  const [busy,setBusy]=useState(false);
  const [hist,setHist]=useState(()=>{try{return JSON.parse(localStorage.getItem("kk_customer_complaints")||"[]");}catch(e){return [];}});
  const [q,setQ]=useState("");
  const saveHist=(list)=>{setHist(list);try{localStorage.setItem("kk_customer_complaints",JSON.stringify(list));}catch(e){}};
  const gen=async()=>{
    if(!body.trim()){alert("\u82E6\u60C5\u5185\u5BB9\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044");return;}
    setBusy(true);
    const prompt =
      "\u8CFC\u5165\u30BD\u30D5\u30C8\u306E\u304A\u5BA2\u69D8\u82E6\u60C5\u53D7\u4ED8\u3067\u3059\u3002\u4EE5\u4E0B\u306E\u5185\u5BB9\u3092\u3001\u7BA1\u7406\u8005\u3078\u901A\u77E5\u3059\u308B\u6587\u7AE0\u3068\u3057\u3066\u6574\u7406\u3057\u3066\u304F\u3060\u3055\u3044\u3002"+
      "\u51FA\u529B\u306F\u3010\u4EF6\u540D\u3011\u3010\u53D7\u4ED8\u65E5\u6642\u3011\u3010\u304A\u5BA2\u69D8\u60C5\u5831\u3011\u3010\u82E6\u60C5\u5185\u5BB9\u306E\u8981\u7D04\u3011\u3010\u7DCA\u6025\u5EA6\u3011\u3010\u7BA1\u7406\u8005\u5BFE\u5FDC\u6848\u3011\u3010\u304A\u5BA2\u69D8\u3078\u306E\u8FD4\u4FE1\u6587\u6848\u3011\u306E\u5F62\u5F0F\u3002"+
      "\u4E01\u5BE7\u3067\u8AA0\u5B9F\u306A\u65E5\u672C\u8A9E\u3002\u81EA\u52D5\u8FD4\u4FE1\u3067\u306F\u306A\u304F\u7BA1\u7406\u8005\u78BA\u8A8D\u524D\u63D0\u3002"+
      "\n\u901A\u77E5\u5148:"+ADMIN_MAIL+
      "\n\u304A\u5BA2\u69D8\u540D:"+customer+
      "\n\u4F1A\u793E\u540D:"+company+
      "\n\u30E1\u30FC\u30EB:"+email+
      "\n\u8CFC\u5165\u30BD\u30D5\u30C8:"+soft+
      "\n\u82E6\u60C5\u533A\u5206:"+ctype+
      "\n\u7DCA\u6025\u5EA6:"+priority+
      "\n\u82E6\u60C5\u5185\u5BB9:"+body+
      "\n\u5E0C\u671B\u5BFE\u5FDC:"+request;
    const r=await ai(prompt);
    const text=(r&&r.trim()) ? r.trim() :
      "\u4EF6\u540D\uFF1A\u3010\u82E6\u60C5\u53D7\u4ED8\u3011"+(soft||"\u8CFC\u5165\u30BD\u30D5\u30C8")+"\uFF0F"+(company||"\u672A\u5165\u529B")+"\uFF0F"+(customer||"\u672A\u5165\u529B")+"\u69D8\n\n"+
      "\u9001\u4FE1\u5148\uFF1A"+ADMIN_MAIL+"\n\n"+
      "\u3010\u53D7\u4ED8\u65E5\u6642\u3011\n"+new Date().toLocaleString("ja-JP")+"\n\n"+
      "\u3010\u304A\u5BA2\u69D8\u60C5\u5831\u3011\n\u304A\u5BA2\u69D8\u540D\uFF1A"+(customer||"\u672A\u5165\u529B")+"\n\u4F1A\u793E\u540D\u30FB\u4E8B\u696D\u6240\u540D\uFF1A"+(company||"\u672A\u5165\u529B")+"\n\u30E1\u30FC\u30EB\uFF1A"+(email||"\u672A\u5165\u529B")+"\n\u8CFC\u5165\u30BD\u30D5\u30C8\uFF1A"+(soft||"\u672A\u5165\u529B")+"\n\n"+
      "\u3010\u82E6\u60C5\u533A\u5206\u3011\n"+ctype+"\n\n\u3010\u7DCA\u6025\u5EA6\u3011\n"+priority+"\n\n\u3010\u82E6\u60C5\u5185\u5BB9\u3011\n"+body+"\n\n\u3010\u5E0C\u671B\u3059\u308B\u5BFE\u5FDC\u3011\n"+(request||"\u672A\u5165\u529B")+"\n\n"+
      "\u3010\u7BA1\u7406\u8005\u5BFE\u5FDC\u6848\u3011\n1. \u5185\u5BB9\u78BA\u8A8D\n2. \u304A\u5BA2\u69D8\u3078\u53D7\u4ED8\u9023\u7D61\n3. \u4E0D\u5177\u5408\u78BA\u8A8D\n4. \u5BFE\u5FDC\u65B9\u91DD\u6C7A\u5B9A\n5. \u518D\u767A\u9632\u6B62\u7B56\u3092\u8A18\u9332\n\n"+
      "\u3010\u8FD4\u4FE1\u6587\u6848\u3011\n"+(customer||"\u304A\u5BA2\u69D8")+"\u69D8\n\n\u3053\u306E\u305F\u3073\u306F\u3054\u4E0D\u4FBF\u30FB\u3054\u5FC3\u914D\u3092\u304A\u304B\u3051\u3057\u3001\u8AA0\u306B\u7533\u3057\u8A33\u3054\u3056\u3044\u307E\u305B\u3093\u3002\n\u3054\u9023\u7D61\u3044\u305F\u3060\u3044\u305F\u5185\u5BB9\u3092\u78BA\u8A8D\u3044\u305F\u3057\u307E\u3057\u305F\u3002\n\u78BA\u8A8D\u306E\u3046\u3048\u3001\u5FC5\u8981\u306A\u5BFE\u5FDC\u3092\u9032\u3081\u3055\u305B\u3066\u3044\u305F\u3060\u304D\u307E\u3059\u3002\n\n\u7BA1\u7406\u8005\n\u677E\u5143 \u5B5D\u4EC1\n\u901A\u77E5\u5148\uFF1A"+ADMIN_MAIL+"\n\n\u203B\u3053\u306E\u6587\u7AE0\u306FAI\u4F5C\u6210\u6848\u3067\u3059\u3002\u9001\u4FE1\u524D\u306B\u5FC5\u305A\u7BA1\u7406\u8005\u304C\u78BA\u8A8D\u3057\u3066\u304F\u3060\u3055\u3044\u3002";
    setOut(text);
    setBusy(false);
  };
  const save=()=>{
    if(!out.trim()){alert("\u4F5C\u6210\u7D50\u679C\u304C\u3042\u308A\u307E\u305B\u3093");return;}
    const list=[{date:new Date().toLocaleString("ja-JP"),customer,company,email,soft,ctype,priority,text:out},...hist];
    saveHist(list);
    alert("\u5C65\u6B74\u306B\u4FDD\u5B58\u3057\u307E\u3057\u305F");
  };
  const copy=()=>{if(!out.trim()){alert("\u4F5C\u6210\u7D50\u679C\u304C\u3042\u308A\u307E\u305B\u3093");return;} navigator.clipboard.writeText(out); alert("\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F");};
  const mail=()=>{
    if(!out.trim()){alert("\u4F5C\u6210\u7D50\u679C\u304C\u3042\u308A\u307E\u305B\u3093");return;}
    location.href="mailto:"+ADMIN_MAIL+"?subject="+encodeURIComponent("\u3010\u82E6\u60C5\u53D7\u4ED8\u3011\u304A\u5BA2\u69D8\u304B\u3089\u306E\u82E6\u60C5")+"&body="+encodeURIComponent(out);
  };
  const filtered=hist.filter(h=>(h.date+h.customer+h.company+h.email+h.soft+h.ctype+h.text).toLowerCase().includes(q.toLowerCase()));
  return <div style={{padding:14}}>
    <Header title="\u26A0\uFE0F \u304A\u5BA2\u69D8\u82E6\u60C5\u53D7\u4ED8">
      <GBtn onClick={gen} busy={busy} color="#E65100">🤖 AI整理・対応案作成</GBtn>
      <GBtn onClick={copy} disabled={!out} color="#1565C0">📋 コピー</GBtn>
      <GBtn onClick={mail} disabled={!out} color="#5C6BC0">📩 管理者メール作成</GBtn>
      <GBtn onClick={save} disabled={!out} color={G}>💾 履歴保存</GBtn>
      <PrtBtn/>
    </Header>
    <div style={{background:"#FFF3E0",border:"1px solid #FFB74D",borderRadius:6,padding:"8px 12px",fontSize:11,color:"#5D4037",lineHeight:1.8,marginBottom:10}}>
      違うソフトを購入したお客様が苦情を入力する画面です。通知先：<b>{ADMIN_MAIL}</b><br/>
      ※HTML単体では自動送信はできません。「管理者メール作成」でメールソフトを開き、内容確認後に送信してください。
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>お客様名</div><input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="\u4F8B\uFF1A\u5C71\u7530 \u592A\u90CE" style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}/></div>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>会社名・事業所名</div><input value={company} onChange={e=>setCompany(e.target.value)} placeholder="\u4F8B\uFF1A\u3007\u3007\u4E8B\u696D\u6240" style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}/></div>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>メールアドレス</div><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="\u4F8B\uFF1Asample@example.com" style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}/></div>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>購入ソフト名</div><input value={soft} onChange={e=>setSoft(e.target.value)} placeholder="\u4F8B\uFF1A\u304D\u3093\u3053\u3093\u304B\u3093 AI\u652F\u63F4\u8A18\u9332Pro" style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}/></div>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>苦情の種類</div><select value={ctype} onChange={e=>setCtype(e.target.value)} style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}><option>不具合・エラー</option><option>操作方法が分からない</option><option>AI文章の内容について</option><option>料金・契約について</option><option>サポート対応について</option><option>その他</option></select></div>
      <div><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>緊急度</div><select value={priority} onChange={e=>setPriority(e.target.value)} style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5}}><option>通常</option><option>急ぎ</option><option>至急</option></select></div>
    </div>
    <div style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>苦情内容</div><PA v={body} s={setBody} rows={5}/></div>
    <div style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>希望する対応</div><PA v={request} s={setRequest} rows={3}/></div>
    <div style={{background:"#FFFDE7",border:"1px solid #F9A825",borderRadius:6,padding:10,marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:"bold",color:"#E65100",marginBottom:4}}>AI整理結果・管理者宛メール文</div>
      <pre style={{margin:0,whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.7}}>{out||"\u3053\u3053\u306BAI\u6574\u7406\u7D50\u679C\u304C\u8868\u793A\u3055\u308C\u307E\u3059\u3002"}</pre>
    </div>
    <div style={{border:"1px solid #C8E6C9",borderRadius:6,padding:10}}>
      <div style={{fontSize:12,fontWeight:"bold",color:G,marginBottom:6}}>📚 苦情受付履歴</div>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="\u5C65\u6B74\u691C\u7D22" style={{width:"100%",padding:"7px 9px",border:"1px solid #A5D6A7",borderRadius:5,marginBottom:8}}/>
      <div className="np" style={{display:"flex",gap:6,marginBottom:8}}>
        <GBtn onClick={()=>saveJSON("\u304A\u5BA2\u69D8\u82E6\u60C5\u53D7\u4ED8_\u5C65\u6B74",hist)} disabled={hist.length===0} color="#1565C0">💾 JSON保存</GBtn>
        <GBtn onClick={()=>{if(window.confirm("\u5C65\u6B74\u3092\u5168\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F"))saveHist([])}} disabled={hist.length===0} color="#C62828">🗑 全削除</GBtn>
      </div>
      {filtered.length===0?<div style={{fontSize:11,color:"#888"}}>履歴はありません。</div>:filtered.map((h,i)=><div key={i} style={{borderTop:"1px solid #E0E0E0",padding:"8px 0"}}>
        <div style={{fontSize:10,color:"#888",marginBottom:3}}>{h.date}　{h.customer}　{h.soft}</div>
        <pre style={{whiteSpace:"pre-wrap",fontSize:11,lineHeight:1.6,background:"#fafafa",padding:7,borderRadius:4,margin:0}}>{h.text}</pre>
        <button className="np" onClick={()=>saveHist(hist.filter(x=>x!==h))} style={{marginTop:4,background:"#C62828",color:"#fff",border:"none",borderRadius:4,padding:"4px 8px",fontSize:10,cursor:"pointer"}}>削除</button>
      </div>)}
    </div>
  </div>;
}


// ===== 職員の管理（管理者のみ） v7.35 =====
function StaffManager({staffList,setStaffList,me,onClose}){
  const [name,setName]=useState(""); const [pin,setPin]=useState(""); const [role,setRole]=useState("staff");
  const [err,setErr]=useState(""); const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);

  const reload=async()=>{ try{ const r=await api("/load",{}); setStaffList(r.staff||[]); }catch(e){} };

  const add=async()=>{
    if(!name.trim()){setErr("お名前を入力してください");return;}
    if(!/^\d{4,6}$/.test(pin)){setErr("PINは4〜6桁の数字で入力してください");return;}
    setErr("");setMsg("");setBusy(true);
    try{
      await api("/staff/add",{name:name.trim(),pin,role});
      await reload();
      setMsg(name.trim()+" さんを追加しました");
      setName("");setPin("");setRole("staff");
    }catch(e){ setErr(e.message); }
    setBusy(false);
  };

  const remove=async(s)=>{
    if(!window.confirm(s.name+" さんを削除しますか？\n※ログインできなくなります。これまでの記録は残ります。"))return;
    setErr("");setMsg("");setBusy(true);
    try{ await api("/staff/remove",{staffId:s.id}); await reload(); setMsg(s.name+" さんを削除しました"); }
    catch(e){ setErr(e.message); }
    setBusy(false);
  };

  const resetPin=async(s)=>{
    const p=window.prompt(s.name+" さんの新しいPIN（4〜6桁の数字）");
    if(!p)return;
    if(!/^\d{4,6}$/.test(p)){alert("PINは4〜6桁の数字で入力してください");return;}
    setErr("");setMsg("");setBusy(true);
    try{ await api("/staff/pin",{staffId:s.id,pin:p}); setMsg(s.name+" さんのPINを変更しました"); }
    catch(e){ setErr(e.message); }
    setBusy(false);
  };

  return <div className="np" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
    <div style={{width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto",background:"#fff",borderRadius:12,boxShadow:"0 10px 40px rgba(0,0,0,.3)"}}>
      <div style={{background:"#0277BD",color:"#fff",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:16,fontWeight:"bold"}}>👥 職員の管理</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
      </div>
      <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
        {err&&<div style={{background:"#FFEBEE",border:"1px solid #EF9A9A",borderRadius:5,padding:"8px 11px",fontSize:12,color:"#C62828"}}>{err}</div>}
        {msg&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"8px 11px",fontSize:12,color:"#1B5E20"}}>{msg}</div>}

        <div>
          <div style={{fontSize:12.5,fontWeight:"bold",color:"#0277BD",marginBottom:7}}>登録されている職員（{staffList.length}名）</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {staffList.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:8,border:"1px solid #E0E0E0",borderRadius:6,padding:"8px 10px"}}>
              <div style={{flex:1,fontSize:13.5,fontWeight:"bold",color:"#333"}}>
                {s.name}
                {s.role==="admin"&&<span style={{fontSize:9.5,marginLeft:6,background:"#FFF3E0",color:"#E65100",border:"1px solid #FFCC80",borderRadius:3,padding:"1px 5px"}}>管理者</span>}
                {me&&s.id===me.staffId&&<span style={{fontSize:9.5,marginLeft:5,color:"#888"}}>（あなた）</span>}
              </div>
              <button onClick={()=>resetPin(s)} disabled={busy} style={{padding:"4px 9px",fontSize:10.5,background:"#E1F5FE",color:"#01579B",border:"1px solid #B3E5FC",borderRadius:4,cursor:"pointer"}}>PIN変更</button>
              {me&&s.id!==me.staffId&&<button onClick={()=>remove(s)} disabled={busy} style={{padding:"4px 9px",fontSize:10.5,background:"#FFEBEE",color:"#C62828",border:"1px solid #EF9A9A",borderRadius:4,cursor:"pointer"}}>削除</button>}
            </div>)}
          </div>
        </div>

        <div style={{borderTop:"1px solid #E0E0E0",paddingTop:14}}>
          <div style={{fontSize:12.5,fontWeight:"bold",color:"#0277BD",marginBottom:8}}>＋ 職員を追加する</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <div>
              <div style={{fontSize:11,color:"#666",marginBottom:3}}>お名前</div>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="例：田中 花子"
                style={{width:"100%",padding:"9px 11px",fontSize:13.5,border:"1px solid #B3E5FC",borderRadius:5,boxSizing:"border-box"}}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#666",marginBottom:3}}>PIN（4桁の数字）</div>
              <input value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,"").slice(0,6))} inputMode="numeric" placeholder="1234"
                style={{width:"100%",padding:"9px 11px",fontSize:15,border:"1px solid #B3E5FC",borderRadius:5,letterSpacing:4,textAlign:"center",boxSizing:"border-box"}}/>
              <div style={{fontSize:10,color:"#888",marginTop:3}}>本人に伝えてください。あとから変更できます。</div>
            </div>
            <div>

  const submitPin=async(p)=>{
    const v=p!==undefined?p:pin;
    if(!/^\d{4,6}$/.test(v)){setErr("PINを入力してください");return;}
    setErr(""); setBusy(true);
    try{
      const r=await api("/login/staff",{licenseKey:fac.licenseKey,staffId:who.id,pin:v});

        token:r.token, staffId:r.staff.id, staffName:r.staff.name, role:r.staff.role,

      });
    }catch(e){ setErr(e.message); setPin(""); setBusy(false); }
  };

  const tapPad=(d)=>{
    if(busy) return;
    if(d==="del"){ setPin(p=>p.slice(0,-1)); return; }

      </div>
      <div>
        <div style={{fontSize:12,fontWeight:"bold",color:"#1B5E20",marginBottom:5}}>PIN（4桁の数字）</div>
        <input value={bPin} onChange={e=>setBPin(e.target.value.replace(/\D/g,"").slice(0,6))} type="password" inputMode="numeric"

      </div>

        style={{background:"none",border:"none",color:"#888",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>事業所コードを入力しなおす</button>
    </div>
  </div></div>;

  // --- 2. 職員をえらぶ ---
  if(step==="staff") return <div style={LOGIN_WRAP}><div style={LOGIN_BOX}>

    </div>
  </div></div>;

  // --- 3. PIN ---
  const PAD=["1","2","3","4","5","6","7","8","9","","0","del"];
  return <div style={LOGIN_WRAP}><div style={LOGIN_BOX}>
    <Head sub={who?who.name:""}/>
    <div style={LOGIN_BODY}>
      <div style={{fontSize:14,fontWeight:"bold",color:"#1B5E20",textAlign:"center"}}>PINを入力してください</div>

        {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",

  </div></div>;

      add("__system__","office",office,office);

      try{
        const res=await api("/save",{changes:pend.map(c=>({userName:c.userName,dataType:c.dataType,content:c.content,base:c.base}))});

        setSyncErr("");
      }catch(e){ setSyncErr("クラウド保存に失敗しました（"+e.message+"）"); }

        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setOfficeOpen(false)} style={{padding:"8px 20px",fontSize:12,fontWeight:"bold",background:GM,color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>✅ 閉じる（保存済み）</button>
        </div>
      </div>
    </div>}
    {bulkOpen&&<div className="np" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setBulkOpen(false)}>
      <div style={{background:"#fff",borderRadius:8,padding:18,width:420,maxWidth:"92vw",maxHeight:"86vh",display:"flex",flexDirection:"column",gap:10}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:"bold",color:G}}>📋 利用者名簿の一括入れ替え</div>
        <div style={{fontSize:11,color:"#666",lineHeight:1.7}}>
          1行に1名ずつ氏名を入力してください（現在の名簿が入っています）。<br/>
          Excelの氏名列をコピーしてそのまま貼り付けることもできます。<br/>
          <span style={{color:"#E65100"}}>※名簿から外れた方のデータは削除されず保管され、同じ氏名で再追加すると復元されます。</span>
        </div>
        <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} rows={15}
          style={{width:"100%",padding:"8px 10px",fontSize:12,border:"1px solid #C8E6C9",borderRadius:5,resize:"vertical",lineHeight:1.7,fontFamily:"Meiryo,sans-serif"}}/>
        <div style={{fontSize:10,color:"#888"}}>現在 {bulkText.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).length} 名</div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setBulkOpen(false)} style={{padding:"7px 16px",fontSize:12,background:"#eee",border:"none",borderRadius:4,cursor:"pointer"}}>キャンセル</button>
          <button onClick={applyBulk} style={{padding:"7px 16px",fontSize:12,fontWeight:"bold",background:GM,color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>この名簿に入れ替える</button>
        </div>
      </div>
    </div>}
  </div>;
}
// ===== PINロック画面（端末セキュリティ） =====
function LockGate({hasPin,onUnlocked}){
  const [pin,setPin]=useState("");
  const [pin2,setPin2]=useState("");
  const [hint,setHint]=useState("");
  const [err,setErr]=useState("");
  const [ack,setAck]=useState(false);
  const [busy,setBusy]=useState(false);
  const savedHint = hasPin ? (window.__sec.hint&&window.__sec.hint()) : "";
  const run=(fn)=>{ setBusy(true); setErr(""); setTimeout(()=>{ try{fn();}finally{setBusy(false);} },30); };
  const doSetup=()=>run(()=>{
    if(pin.length<4){setErr("パスコードは4桁以上にしてください");return;}
    if(pin!==pin2){setErr("確認用パスコードが一致しません");return;}
    if(!ack){setErr("バックアップ確認にチェックしてください");return;}
    window.__sec.setup(pin,hint); onUnlocked();
  });
  const doUnlock=()=>run(()=>{
    if(window.__sec.unlock(pin)){ onUnlocked(); }
    else { setErr("パスコードが違います"); setPin(""); }
  });
  const box={width:"100%",padding:"12px 14px",fontSize:18,letterSpacing:2,textAlign:"center",border:"2px solid #A5D6A7",borderRadius:8,marginBottom:10,boxSizing:"border-box"};
  const btn={width:"100%",padding:"13px 0",background:busy?"#9E9E9E":"#1B5E20",color:"#fff",border:"none",borderRadius:8,fontSize:16,fontWeight:"bold",cursor:busy?"wait":"pointer"};
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#E8F5E9,#F1F8E9)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:400,background:"#fff",borderRadius:14,boxShadow:"0 8px 28px rgba(0,0,0,0.18)",overflow:"hidden",border:"2px solid #C8E6C9"}}>
      <div style={{background:"#1B5E20",color:"#fff",padding:"20px 24px",textAlign:"center"}}>
        <div style={{fontSize:22,marginBottom:2}}>🔒</div>
        <div style={{fontSize:16,fontWeight:"bold"}}>{hasPin?"ロック解除":"パスコードの設定"}</div>
        <div style={{fontSize:11,opacity:.85,marginTop:2}}>この端末の記録データを保護します</div>
      </div>
      <div style={{padding:"22px 26px"}}>
        {err&&<div style={{background:"#FFEBEE",border:"1px solid #EF9A9A",borderRadius:6,padding:"8px 10px",fontSize:12,color:"#C62828",marginBottom:10}}>{err}</div>}
        {!hasPin ? <>
          <div style={{background:"#FFFDE7",border:"1px solid #F9A825",borderRadius:6,padding:"10px 12px",fontSize:12,lineHeight:1.7,color:"#5D4037",marginBottom:12}}>
            <b>⚠️ 重要</b><br/>
            設定したパスコードで<b>保存データを暗号化</b>します。<br/>
            <b>パスコードを忘れると、暗号化された記録は復元できません。</b><br/>
            設定前に「バックアップ（JSON書き出し）」で控えを取り、パスコードは安全に保管してください。
          </div>
          <input type="password" inputMode="numeric" value={pin} onChange={e=>setPin(e.target.value)} placeholder="新しいパスコード（4桁以上）" style={box}/>
          <input type="password" inputMode="numeric" value={pin2} onChange={e=>setPin2(e.target.value)} placeholder="もう一度入力" style={box}/>
          <input type="text" value={hint} onChange={e=>setHint(e.target.value)} placeholder="ヒント（任意・パスコードそのものは書かない）" style={{...box,fontSize:13,letterSpacing:0}}/>
          <label style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"#444",marginBottom:12,cursor:"pointer"}}>
            <input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)} style={{marginTop:2}}/>
            <span>バックアップを取り、パスコードを忘れないことを確認しました</span>
          </label>
          <button onClick={doSetup} disabled={busy} style={btn}>{busy?"設定中…":"🔐 設定して始める"}</button>
        </> : <>
          <input type="password" inputMode="numeric" value={pin} autoFocus onChange={e=>setPin(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")doUnlock();}} placeholder="パスコード" style={box}/>
          {savedHint&&<div style={{fontSize:11,color:"#888",marginBottom:10}}>ヒント：{savedHint}</div>}
          <button onClick={doUnlock} disabled={busy} style={btn}>{busy?"確認中…":"🔓 解除する"}</button>
        </>}
      </div>
    </div>
  </div>;
}

function AppRoot(){
  const [unlocked,setUnlocked]=useState(false);
  const [hasPin,setHasPin]=useState(()=>window.__sec.hasPin());
  // 自動ロック（15分無操作）
  useEffect(()=>{
    if(!unlocked) return;
    let t;
    const reset=()=>{ clearTimeout(t); t=setTimeout(()=>{ window.__sec.lock(); setUnlocked(false); }, 15*60*1000); };
    const evs=["mousedown","keydown","touchstart","mousemove","wheel"];
    evs.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    reset();
    return ()=>{ clearTimeout(t); evs.forEach(e=>window.removeEventListener(e,reset)); };
  },[unlocked]);
  const handleUnlocked=()=>{
    // 解錠後、暗号化された事業所設定を読み直してグローバルを最新化する
    // （officeKey が使う _currentOfficeId・OFFICE はロック中に空で初期化されているため）
    try{ updateOfficeId(getCurrentOfficeId()); }catch(e){}
    try{ OFFICE={...OFFICE_DEFAULT,...(JSON.parse(localStorage.getItem(officeKey("office"))||"{}"))}; }catch(e){}
    setHasPin(true); setUnlocked(true);
  };
  if(!unlocked) return <LockGate hasPin={hasPin} onUnlocked={handleUnlocked}/>;
  return <>
    <button onClick={()=>{ window.__sec.lock(); setUnlocked(false); }}
      title="今すぐロック"
      style={{position:"fixed",top:6,right:6,zIndex:99999,background:"#1B5E20",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:"bold",cursor:"pointer",opacity:.85}}>🔒 ロック</button>
    <AppMain/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppRoot/>);
</script>
</body>
